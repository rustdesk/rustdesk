name: Setup Linux build environment
description: Shared setup for CI and benchmarks — installs system deps, vcpkg, Rust toolchain, and caches.

inputs:
  vcpkg-commit-id:
    description: vcpkg Git commit to pin
    default: "120deac3062162151622ca4860575a33844ba10b"
  rust-toolchain:
    description: Rust toolchain channel
    default: stable

runs:
  using: composite
  steps:
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: false
        docker-images: true
        swap-storage: false

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v6
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install prerequisites
      shell: bash
      run: |
        sudo apt-get -y update
        sudo apt-get install -y \
          clang \
          cmake \
          curl \
          gcc \
          git \
          g++ \
          libpam0g-dev \
          libasound2-dev \
          libunwind-dev \
          libgstreamer1.0-dev \
          libgstreamer-plugins-base1.0-dev \
          libgtk-3-dev \
          libpulse-dev \
          libva-dev \
          libvdpau-dev \
          libxcb-randr0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxdo-dev \
          libxfixes-dev \
          nasm \
          wget

    - name: Setup vcpkg with Github Actions binary cache
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: /opt/artifacts/vcpkg
        vcpkgGitCommitId: ${{ inputs.vcpkg-commit-id }}

    - name: Install vcpkg dependencies
      shell: bash
      run: $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@v1
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    - uses: Swatinem/rust-cache@v2
