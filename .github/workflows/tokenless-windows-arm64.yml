name: Tokenless Windows ARM64

on:
  workflow_dispatch:
    inputs:
      upload_tag:
        description: Release tag used for publishing release assets
        required: false
        default: tokenless-nightly
  push:
    branches: [tokenless-ci]
    paths:
      - src/ui_session_interface.rs
      - src/main.rs
      - .github/workflows/tokenless-windows-arm64.yml

permissions:
  contents: write
  actions: read

concurrency:
  group: tokenless-windows-arm64-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_VERSION: '1.75'
  LLVM_VERSION: '15.0.6'
  FLUTTER_VERSION: '3.44.0'
  DART_SDK_VERSION: '3.12.0'
  VCPKG_COMMIT_ID: '120deac3062162151622ca4860575a33844ba10b'
  VERSION: '1.4.6-tokenless'
  VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build:
    name: windows-arm64-tokenless
    needs: [generate-bridge]
    runs-on: windows-11-arm
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Verify tokenless patch is present
        shell: bash
        run: |
          grep -n "let token = String::new();" src/ui_session_interface.rs
          grep -n "let token = String::new();" src/main.rs

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@1a3da29f56261a1e1f937ec88f0856a9b8321d7e
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-pc-windows-msvc
          components: rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          prefix-key: windows-11-arm-tokenless-full

      - name: Setup vcpkg with GitHub Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install ARM64 vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: arm64-windows-static
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          if ! $VCPKG_ROOT/vcpkg install \
            aom:arm64-windows-static \
            libvpx:arm64-windows-static \
            libyuv:arm64-windows-static \
            opus:arm64-windows-static \
            libsodium:arm64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" -print -exec cat {} \;
            exit 1
          fi

      - name: Install Flutter with Windows ARM64 engine
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $flutterArchive = "$env:RUNNER_TEMP\flutter_windows_${env:FLUTTER_VERSION}-stable.zip"
          $flutterRoot = "$env:RUNNER_TEMP\flutter"
          Invoke-WebRequest -Uri "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_${env:FLUTTER_VERSION}-stable.zip" -OutFile $flutterArchive
          Expand-Archive -Path $flutterArchive -DestinationPath $env:RUNNER_TEMP -Force
          $dartArchive = "$env:RUNNER_TEMP\dartsdk-windows-arm64-release.zip"
          $dartExtract = "$env:RUNNER_TEMP\dart-arm64"
          Invoke-WebRequest -Uri "https://storage.googleapis.com/dart-archive/channels/stable/release/${env:DART_SDK_VERSION}/sdk/dartsdk-windows-arm64-release.zip" -OutFile $dartArchive
          Expand-Archive -Path $dartArchive -DestinationPath $dartExtract -Force
          Remove-Item -LiteralPath "$flutterRoot\bin\cache\dart-sdk" -Recurse -Force
          Move-Item -LiteralPath "$dartExtract\dart-sdk" -Destination "$flutterRoot\bin\cache\dart-sdk"
          "$flutterRoot\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Prepare ARM64 build patches
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          flutter doctor -v
          flutter config --enable-windows-desktop
          flutter precache --windows
          $engineRoot = Join-Path (Split-Path -Parent (Split-Path -Parent (Get-Command flutter).Source)) 'bin\cache\artifacts\engine'
          Get-ChildItem -LiteralPath $engineRoot | Where-Object { $_.Name -like 'windows-arm64*' } | Format-Table -AutoSize
          dart --version
          flutter devices

          $cmake = 'flutter\windows\CMakeLists.txt'
          $text = Get-Content -LiteralPath $cmake -Raw
          $replacement = @(
            'if(CMAKE_SYSTEM_PROCESSOR MATCHES "ARM64|aarch64")',
            '  set(RUSTDESK_LIB "../../target/aarch64-pc-windows-msvc/${RUSTDESK_LIB_BUILD_TYPE}/librustdesk.dll")',
            'else()',
            '  set(RUSTDESK_LIB "../../target/${RUSTDESK_LIB_BUILD_TYPE}/librustdesk.dll")',
            'endif()'
          ) -join "`n"
          $text = $text -replace 'set\(RUSTDESK_LIB "\.\./\.\./target/\$\{RUSTDESK_LIB_BUILD_TYPE\}/librustdesk\.dll"\)', $replacement
          Set-Content -LiteralPath $cmake -Value $text -Encoding UTF8

          $pubspec = 'flutter\pubspec.yaml'
          $pub = Get-Content -LiteralPath $pubspec -Raw
          $pub = $pub -replace 'extended_text: 14\.0\.0', 'extended_text: ^15.0.2'
          $pub = $pub -replace 'google_fonts: \^[0-9.]+', 'google_fonts: ^8.1.0'
          Set-Content -LiteralPath $pubspec -Value $pub -Encoding UTF8

          $common = 'flutter\lib\common.dart'
          $commonText = Get-Content -LiteralPath $common -Raw
          $commonText = $commonText -creplace 'DialogTheme\(', 'DialogThemeData('
          $commonText = $commonText -creplace 'TabBarTheme\(', 'TabBarThemeData('
          Set-Content -LiteralPath $common -Value $commonText -Encoding UTF8

          New-Item -ItemType Directory -Force -Path .cargo | Out-Null
          @(
            '[target.aarch64-pc-windows-msvc]',
            'rustflags = ["-L", "native=C:\\vcpkg\\installed\\arm64-windows-static\\lib", "-l", "static=sodium"]'
          ) | Set-Content -LiteralPath .cargo\config.toml -Encoding UTF8
          Get-Content -LiteralPath .cargo\config.toml

      - name: Build complete Windows ARM64 package
        shell: cmd
        env:
          VCPKG_ROOT: C:\vcpkg
          VCPKG_INSTALLED_ROOT: C:\vcpkg\installed
          VCPKG_DEFAULT_TRIPLET: arm64-windows-static
          VCPKG_DEFAULT_HOST_TRIPLET: arm64-windows-static
          SODIUM_LIB_DIR: C:\vcpkg\installed\arm64-windows-static\lib
          SODIUM_INCLUDE_DIR: C:\vcpkg\installed\arm64-windows-static\include
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" arm64 || call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" arm64 || call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" arm64
          set LIB=C:\vcpkg\installed\arm64-windows-static\lib;%LIB%
          set INCLUDE=C:\vcpkg\installed\arm64-windows-static\include;%INCLUDE%
          cargo build --locked --features flutter --release --target aarch64-pc-windows-msvc --lib
          cd flutter
          call flutter pub get
          call flutter build windows --release

      - name: Repair Flutter assets and verify ARM64 PE files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path -LiteralPath 'flutter\build\windows') {
            Write-Host 'Flutter Windows build directories:'
            Get-ChildItem -LiteralPath 'flutter\build\windows' -Recurse -Directory |
              Select-Object -ExpandProperty FullName
            Write-Host 'RustDesk executables found under flutter\build\windows:'
            Get-ChildItem -LiteralPath 'flutter\build\windows' -Recurse -Filter rustdesk.exe -File |
              Select-Object -ExpandProperty FullName
          }

          $preferred = 'flutter\build\windows\arm64\runner\Release'
          $releaseCandidates = @()
          if (Test-Path -LiteralPath $preferred) {
            $releaseCandidates += (Resolve-Path -LiteralPath $preferred).Path
          }
          if (-not $releaseCandidates) {
            $releaseCandidates = @(Get-ChildItem -LiteralPath 'flutter\build\windows' -Recurse -Directory -Filter Release -ErrorAction SilentlyContinue |
              Where-Object { Test-Path -LiteralPath (Join-Path $_.FullName 'rustdesk.exe') } |
              Select-Object -ExpandProperty FullName)
          }
          if (-not $releaseCandidates) {
            throw 'No Flutter Windows Release directory containing rustdesk.exe was produced'
          }

          function Get-PeInfo([string[]] $Path) {
            foreach ($file in ($Path | Select-Object -Unique)) {
              $resolved = Resolve-Path -LiteralPath $file -ErrorAction Stop
              $bytes = [System.IO.File]::ReadAllBytes($resolved.Path)
              if ($bytes.Length -lt 0x40) { throw "File too small to be a PE image: $($resolved.Path)" }
              $peOffset = [BitConverter]::ToInt32($bytes, 0x3c)
              if ($peOffset -lt 0 -or $peOffset + 6 -ge $bytes.Length) { throw "Invalid PE header offset: $($resolved.Path)" }
              $signature = [Text.Encoding]::ASCII.GetString($bytes, $peOffset, 4)
              if ($signature -ne "PE$([char]0)$([char]0)") { throw "Missing PE signature: $($resolved.Path)" }
              $machine = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
              [pscustomobject]@{
                Machine = ('0x{0:X4}' -f $machine)
                Arch = if ($machine -eq 0xaa64) { 'ARM64' } elseif ($machine -eq 0x8664) { 'x64' } elseif ($machine -eq 0x014c) { 'x86' } else { 'other' }
                Path = $resolved.Path
              }
            }
          }

          $selectedRelease = $null
          foreach ($candidate in $releaseCandidates) {
            Write-Host "Checking release candidate: $candidate"
            $files = @(
              (Join-Path $candidate 'rustdesk.exe'),
              (Join-Path $candidate 'librustdesk.dll'),
              (Join-Path $candidate 'flutter_windows.dll')
            )
            $files += Get-ChildItem -LiteralPath $candidate -Recurse -Filter '*.dll' -File | Select-Object -ExpandProperty FullName
            $candidateResults = @(Get-PeInfo -Path $files)
            $candidateResults | Format-Table -AutoSize
            if (-not ($candidateResults | Where-Object { $_.Arch -ne 'ARM64' })) {
              $selectedRelease = $candidate
              break
            }
          }
          if (-not $selectedRelease) {
            throw 'No complete ARM64 Flutter release directory was produced'
          }

          $release = Resolve-Path -LiteralPath $selectedRelease
          $flutterRoot = Split-Path -Parent (Split-Path -Parent (Get-Command flutter).Source)
          $flutterAssets = Join-Path $release.Path 'data\flutter_assets'
          $assetDir = Join-Path $flutterAssets 'assets'
          $fontDir = Join-Path $flutterAssets 'fonts'
          New-Item -ItemType Directory -Force -Path $assetDir, $fontDir | Out-Null
          Copy-Item -LiteralPath 'flutter\assets\*' -Destination $assetDir -Recurse -Force
          Copy-Item -LiteralPath (Join-Path $flutterRoot 'bin\cache\artifacts\material_fonts\materialicons-regular.otf') -Destination (Join-Path $fontDir 'MaterialIcons-Regular.otf') -Force

          $files = @(
            (Join-Path $release.Path 'rustdesk.exe'),
            (Join-Path $release.Path 'librustdesk.dll'),
            (Join-Path $release.Path 'flutter_windows.dll')
          )
          $files += Get-ChildItem -LiteralPath $release.Path -Recurse -Filter '*.dll' -File | Select-Object -ExpandProperty FullName
          $results = @(Get-PeInfo -Path $files)
          $results | Format-Table -AutoSize
          if ($results | Where-Object { $_.Arch -ne 'ARM64' }) {
            throw 'One or more PE files are not ARM64'
          }

          $requiredAssets = @(
            'fonts\MaterialIcons-Regular.otf',
            'assets\tabbar.ttf',
            'assets\peer_searchbar.ttf',
            'assets\address_book.ttf',
            'assets\device_group.ttf',
            'assets\more.ttf',
            'assets\gestures.ttf'
          )
          foreach ($asset in $requiredAssets) {
            $assetPath = Join-Path $flutterAssets $asset
            if (-not (Test-Path -LiteralPath $assetPath)) {
              throw "Missing Flutter asset: $asset"
            }
          }

          New-Item -ItemType Directory -Force -Path SignOutput | Out-Null
          Compress-Archive -Path (Join-Path $release.Path '*') -DestinationPath "SignOutput\rustdesk-${env:VERSION}-windows-arm64-portable.zip" -Force
          Get-FileHash "SignOutput\rustdesk-${env:VERSION}-windows-arm64-portable.zip" -Algorithm SHA256

      - name: Upload ARM64 portable package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: rustdesk-tokenless-windows-arm64-portable
          path: SignOutput/*

      - name: Publish ARM64 package to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.upload_tag || 'tokenless-nightly' }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (Get-Variable -Name PSNativeCommandUseErrorActionPreference -ErrorAction SilentlyContinue) {
            $PSNativeCommandUseErrorActionPreference = $false
          }
          $releaseTitle = "RustDesk Tokenless Nightly"
          $releaseNotes = "Automated tokenless compatibility builds from tokenless-ci. Source commit: $env:GITHUB_SHA"
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title $releaseTitle --notes $releaseNotes
            if ($LASTEXITCODE -ne 0) {
              gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to create or find release $env:RELEASE_TAG"
              }
            }
          }
          Get-ChildItem -Path .\SignOutput -File | ForEach-Object {
            gh release upload $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY $_.FullName --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload $($_.FullName)"
            }
          }
