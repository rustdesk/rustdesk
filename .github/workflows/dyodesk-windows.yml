name: DyoDesk Windows x64 Hızlı Derleme

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  RUST_VERSION: "1.75"
  LLVM_VERSION: "15.0.6"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-topmost:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    with:
      upload-artifact: true
      target: windows-2022
      configuration: Release
      platform: x64
      target_version: Windows10

  build-windows-x64:
    name: Windows x64
    needs:
      - generate-bridge
      - build-topmost
    runs-on: windows-2022

    steps:
      - name: GitHub Actions cache değişkenlerini ayarla
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410
        with:
          script: |
            core.exportVariable(
              'ACTIONS_CACHE_URL',
              process.env.ACTIONS_CACHE_URL || ''
            );
            core.exportVariable(
              'ACTIONS_RUNTIME_TOKEN',
              process.env.ACTIONS_RUNTIME_TOKEN || ''
            );

      - name: Kaynak kodu al
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Bridge dosyalarını indir
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: bridge-artifact
          path: ./

      - name: LLVM ve Clang kur
        uses: KyleMayes/install-llvm-action@ebc0426251bc40c7cd31162802432c68818ab8f0
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Flutter kur
        uses: subosito/flutter-action@2783a3f08e1baf891508463f8c6653c258246225
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          architecture: x64
          cache: true

      - name: Özel Flutter motorunu kur
        shell: powershell
        run: |
          flutter doctor -v
          flutter precache --windows

          Invoke-WebRequest `
            -Uri "https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip" `
            -OutFile "windows-x64-release.zip"

          Expand-Archive `
            -Path "windows-x64-release.zip" `
            -DestinationPath "windows-x64-release"

          Move-Item `
            -Path "windows-x64-release\*" `
            -Destination "C:\hostedtoolcache\windows\flutter\stable-${{ env.FLUTTER_VERSION }}-x64\bin\cache\artifacts\engine\windows-x64-release\" `
            -Force

      - name: Flutter yamasını uygula
        shell: bash
        run: |
          FLUTTER_ROOT="$(dirname "$(dirname "$(which flutter)")")"
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff \
             "$FLUTTER_ROOT/"
          cd "$FLUTTER_ROOT"
          git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Rust kur
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: rustfmt

      - name: Rust önbelleğini aç
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          prefix-key: dyodesk-windows-x64

      - name: vcpkg kur ve önbelleği aç
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: vcpkg bağımlılıklarını kur
        shell: bash
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          "$VCPKG_ROOT/vcpkg" install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"

      - name: DyoDesk'i derle
        shell: powershell
        run: |
          python3 .\build.py `
            --portable `
            --flutter `
            --skip-portable-pack `
            --hwcodec `
            --vram

          Move-Item `
            ".\flutter\build\windows\x64\runner\Release" `
            ".\DyoDesk"

      - name: UAC yardımcı dosyasını ekle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: topmostwindow-artifacts-x64
          path: ./DyoDesk

      - name: DyoDesk artifact yükle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: dyodesk-windows-x64-fast
          path: DyoDesk
          retention-days: 14
