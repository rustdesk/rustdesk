name: Restore Tag

on:
  workflow_dispatch: # 允许手动触发

jobs:
  restore-tag:
    runs-on: ubuntu-latest
    steps:
      - name: CheckoutCode
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Fetch and Push Tag
        run: |
          git remote add upstream https://github.com/rustdesk/rustdesk.git
          git fetch upstream --tags
          git push origin 1.4.7
